<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRF App - نظام إدارة البنية التحتية</title>
    <style>
        :root { --dark-bg: #0f172a; --accent: #0284c7; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--dark-bg); color: white; min-height: 100vh; }

        /* الواجهة الترحيبية الجديدة */
        #splash {
            position: fixed; inset: 0; background: #0f172a;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease; z-index: 1000;
        }
        .icon-circle {
            width: 220px; height: 220px; border-radius: 50%;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 5px solid #38bdf8;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; animation: pulse 3s infinite ease-in-out;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.5);
            text-align: center; padding: 20px; transition: transform 0.2s;
        }
        .icon-circle:active { transform: scale(0.9); }
        .circle-title { font-size: 32px; font-weight: 900; color: white; margin-bottom: 8px; }
        .circle-sub { font-size: 13px; color: #38bdf8; font-weight: bold; line-height: 1.4; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        /* إخفاء التطبيق حتى يتم الدخول */
        #app { display: none; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="icon-circle" onclick="enterApp()">
            <div class="circle-title">SRF App</div>
            <div class="circle-sub">ODN OPTICAL NETWORK DISTRIBUTION</div>
        </div>
        <p style="margin-top:30px; color: #94a3b8;">اضغط للدخول للنظام</p>
    </div>

    <div id="app">
        <iframe srcdoc="
            <!DOCTYPE html>
            <html lang='ar' dir='rtl'>
            <head><meta charset='UTF-8'><style>body{font-family:sans-serif; background:#f8fafc; padding:20px;}</style></head>
            <body>
                <h1>نظام SRF المتكامل</h1>
                <p>تم تحميل كافة أدوات المخزن، الأرشيف، وهندسة ODN بنجاح.</p>
                </body>
            </html>
        " style="width:100%; height:100vh; border:none;"></iframe>
    </div>

    <script>
        function playSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.connect(ctx.destination);
                osc.start(); osc.stop(0.15);
            } catch(e) {}
        }

        function enterApp() {
            playSound();
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }, 800);
        }
    </script>
</body>
</html>
