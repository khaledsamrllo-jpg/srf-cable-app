<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRF App - ODN</title>
    <style>
        :root { --slate-900: #0f172a; --indigo-900: #1e1b4b; --emerald-500: #10b981; --sky-600: #0284c7; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        /* 🌟 الواجهة الترحيبية الجديدة (Splash Screen) */
        .splash-screen {
            position: fixed; inset: 0; background: linear-gradient(135deg, var(--slate-900), var(--indigo-900));
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease; color: white; text-align: center; padding: 20px;
        }
        .splash-screen.fade-out { opacity: 0; pointer-events: none; }
        
        .icon-circle {
            width: 220px; height: 220px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 4px solid var(--emerald-500);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; animation: pulse 3s infinite ease-in-out;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
            margin-bottom: 20px; transition: transform 0.2s;
        }
        .icon-circle:active { transform: scale(0.9); }
        .circle-title { font-size: 32px; font-weight: 900; color: white; margin-bottom: 5px; }
        .circle-sub { font-size: 13px; color: var(--emerald-500); font-weight: bold; padding: 0 10px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* إخفاء النظام خلف الواجهة */
        #main-system { display: block; }
    </style>
</head>
<body>

    <div id="splash-screen" class="splash-screen">
        <div class="icon-circle" onclick="enterApp()">
            <div class="circle-title">SRF App</div>
            <div class="circle-sub">ODN OPTICAL NETWORK DISTRIBUTION</div>
        </div>
        <p style="color: #94a3b8;">اضغط للدخول للنظام</p>
    </div>

    <div id="main-system">
        </div>

    <script>
        function playSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.connect(ctx.destination);
                osc.start(); osc.stop(0.15);
            } catch(e) {}
        }

        function enterApp() {
            playSound();
            document.getElementById('splash-screen').classList.add('fade-out');
        }
    </script>
</body>
</html>
