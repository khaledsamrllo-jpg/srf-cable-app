<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRF App</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #0f172a; color: white; }
        .box { background: #1e293b; padding: 20px; border-radius: 15px; margin-top: 50px; }
        input { padding: 10px; width: 80%; margin: 5px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #0284c7; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen" class="box">
        <h3>SRF App v1.3</h3>
        <p id="dev-id">جاري تحميل الرمز...</p>
        <input type="text" id="activation-code" placeholder="أدخل كود التفعيل">
        <br><br>
        <button onclick="checkActivation()">تفعيل التطبيق الآن</button>
    </div>

    <div id="main-app" class="box" style="display:none;">
        <h1>حاسبة الأمتار</h1>
        <input type="number" id="start" placeholder="رقم البداية">
        <input type="number" id="end" placeholder="رقم النهاية">
        <br><br>
        <button onclick="calculate()">احسب الأمتار</button>
        <h2 id="result">النتيجة: 0 متر</h2>
    </div>

    <script>
        // 1. نظام الرمز الثابت
        let deviceId = localStorage.getItem('myDeviceId');
        if (!deviceId) {
            deviceId = "SRF-" + Math.floor(Math.random() * 90000000).toString(16).toUpperCase();
            localStorage.setItem('myDeviceId', deviceId);
        }
        document.getElementById('dev-id').innerText = "رمز جهازك: " + deviceId;

        // 2. دالة التحقق
        function checkActivation() {
            let input = document.getElementById('activation-code').value.trim().toUpperCase();
            let secretMultiplier = 2026;
            let num = parseInt(deviceId.replace("SRF-", ""), 16);
            let expectedKey = "ACT-" + Math.abs((num * secretMultiplier) % 999999);

            if (input === expectedKey) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                localStorage.setItem('activated', 'true');
            } else {
                alert("كود خاطئ!");
            }
        }

        // 3. التحقق التلقائي
        if (localStorage.getItem('activated') === 'true') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }

        // 4. الحساب
        function calculate() {
            let start = document.getElementById('start').value;
            let end = document.getElementById('end').value;
            document.getElementById('result').innerText = "النتيجة: " + Math.abs(end - start) + " متر";
        }
    </script>
</body>
</html>
